name: Update Labor Market Data

on:
  schedule:
    - cron: '0 21 * * *'  # 매일 오전 6시 (한국시간 UTC+9)
  workflow_dispatch:       # 수동 실행도 가능

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r market-predict/requirements.txt

      - name: Run crawler
        working-directory: market-predict
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python main.py

      - name: Copy result to public
        run: cp market-predict/data/result.json public/result.json

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add public/result.json
          git commit -m "chore: 노동시장 데이터 자동 갱신" || echo "No changes"
          git push